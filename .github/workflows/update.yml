name: Update News

on:
  schedule:
    - cron: '0 6 * * *'  # Runs at 6 AM UTC every day
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install feedparser
      - name: Run news update script
        run: python scripts/update_news.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'Epigone15'
          git config --global user.email 'Epigone15@proton.me'
          git add .
          git commit -m 'Automated news update'
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}